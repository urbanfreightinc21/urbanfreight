<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-label="Urban Freight Kenworth T680 truck">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset=".52" stop-color="#12366d"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="truckWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe7f4"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#020617" flood-opacity=".45"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1400" height="760" rx="42" fill="url(#sky)"/>
  <circle cx="1175" cy="100" r="210" fill="#38bdf8" opacity=".12" filter="url(#soft)"/>
  <circle cx="210" cy="165" r="260" fill="#2563eb" opacity=".16" filter="url(#soft)"/>

  <path d="M0 555 C220 500 360 545 560 510 C750 478 910 455 1400 500 L1400 760 L0 760 Z" fill="#061022" opacity=".58"/>
  <path d="M64 619 C310 584 475 590 640 575 C890 553 1120 550 1342 581" fill="none" stroke="#38bdf8" stroke-width="3" opacity=".28"/>
  <rect x="0" y="624" width="1400" height="136" fill="#050b16" opacity=".72"/>
  <path d="M105 665 H1295" stroke="#e5eefc" stroke-width="7" stroke-linecap="round" opacity=".26" stroke-dasharray="70 48"/>

  <g filter="url(#shadow)" transform="translate(55,92)">
    <!-- trailer -->
    <path d="M166 205 Q166 176 196 176 H775 Q800 176 811 198 L884 350 H210 Q166 350 166 306 Z" fill="url(#truckWhite)" stroke="#c7d6e8" stroke-width="5"/>
    <path d="M181 204 H791" stroke="#38bdf8" stroke-width="13" opacity=".78"/>
    <path d="M204 240 H530" stroke="#0f172a" stroke-width="6" opacity=".12"/>
    <path d="M204 274 H705" stroke="#0f172a" stroke-width="5" opacity=".10"/>
    <rect x="247" y="219" width="210" height="84" rx="10" fill="#0b1220" opacity=".07"/>
    <image href="logo.png" x="286" y="196" width="130" height="130" preserveAspectRatio="xMidYMid meet"/>
    <text x="475" y="265" fill="#0b2447" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="44" letter-spacing="5">URBAN FREIGHT</text>
    <text x="479" y="300" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" letter-spacing="3">REEFER • DRY VAN • LIVE TRACKING</text>
    <rect x="190" y="326" width="676" height="24" fill="#94a3b8" opacity=".35"/>

    <!-- tractor long hood Kenworth-ish -->
    <g transform="translate(750,232)">
      <path d="M60 123 L115 42 Q133 17 162 17 H335 Q367 17 390 41 L475 133 Q487 147 488 166 L491 217 H24 L24 174 Q24 143 60 123 Z" fill="url(#truckWhite)" stroke="#c7d6e8" stroke-width="5"/>
      <path d="M153 32 H282 Q304 32 322 50 L376 106 H110 L138 53 Q143 42 153 32 Z" fill="#10213e"/>
      <path d="M296 36 Q322 42 341 62 L385 108 H305 Z" fill="#38bdf8" opacity=".22"/>
      <path d="M393 121 L480 139 Q520 148 548 177 L572 203 Q582 214 571 220 H429 Q388 220 369 187 L341 139 Z" fill="url(#blue)"/>
      <path d="M424 146 H514 Q537 146 553 163 L574 187" stroke="#dff6ff" stroke-width="9" stroke-linecap="round" opacity=".75"/>
      <path d="M74 123 H365" stroke="#2563eb" stroke-width="12" opacity=".88"/>
      <rect x="39" y="188" width="454" height="38" rx="10" fill="#0b1220" opacity=".22"/>
      <rect x="492" y="194" width="87" height="25" rx="8" fill="#dbeafe" opacity=".82"/>
      <rect x="453" y="174" width="58" height="19" rx="7" fill="#facc15" opacity=".95"/>
      <rect x="13" y="214" width="589" height="34" rx="12" fill="#475569"/>
      <rect x="16" y="221" width="586" height="10" rx="5" fill="#94a3b8" opacity=".35"/>
    </g>

    <!-- axles / wheels -->
    <g>
      <g transform="translate(235,440)">
        <circle r="58" fill="#020617"/><circle r="39" fill="#1f2937"/><circle r="18" fill="#94a3b8"/><circle r="7" fill="#e2e8f0"/>
      </g>
      <g transform="translate(353,440)">
        <circle r="58" fill="#020617"/><circle r="39" fill="#1f2937"/><circle r="18" fill="#94a3b8"/><circle r="7" fill="#e2e8f0"/>
      </g>
      <g transform="translate(863,440)">
        <circle r="58" fill="#020617"/><circle r="39" fill="#1f2937"/><circle r="18" fill="#94a3b8"/><circle r="7" fill="#e2e8f0"/>
      </g>
      <g transform="translate(1004,440)">
        <circle r="62" fill="#020617"/><circle r="42" fill="#1f2937"/><circle r="19" fill="#94a3b8"/><circle r="7" fill="#e2e8f0"/>
      </g>
      <g transform="translate(1172,440)">
        <circle r="62" fill="#020617"/><circle r="42" fill="#1f2937"/><circle r="19" fill="#94a3b8"/><circle r="7" fill="#e2e8f0"/>
      </g>
    </g>
  </g>
</svg>
